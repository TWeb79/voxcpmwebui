services:
  voxcpm-webui:
    build: .
    ports:
      - "8038:8038"  # Frontend
      - "8138:8138"  # Backend API
    volumes:
      - ./models:/app/models  # Cache models to avoid re-downloading
      - ./temp:/app/temp      # Temporary files
    environment:
      - VOXCPM_MODEL_PATH=openbmb/VoxCPM2
      - HF_HOME=/app/models/huggingface
      - TRANSFORMERS_CACHE=/app/models/huggingface
    restart: unless-stopped
    # GPU reservation removed for compatibility on hosts without NVIDIA runtime
    # To enable GPU, add appropriate device reservation or install NVIDIA Container Toolkit